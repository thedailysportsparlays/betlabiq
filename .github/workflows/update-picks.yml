name: Update Daily Picks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run prediction updater
        run: python scripts/update_predictions.py

      - name: Commit updated picks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/todays_picks.json
          git commit -m "Update daily picks" || echo "No changes to commit"
          git push
