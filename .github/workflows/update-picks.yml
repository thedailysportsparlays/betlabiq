name: Update Daily Picks

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to update"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mlb
          - wnba
          - nba
          - nhl
          - soccer
  schedule:
    - cron: "5 6 * * *"
