name: Update MLB Public Outputs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update-mlb-public-outputs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show MLB folder
        run: |
          ls -la
          ls -la MLB || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl numpy

      - name: Build MLB public outputs
        run: |
          python MLB/build_public_outputs.py

      - name: Validate generated JSON files
        run: |
          python -m json.tool MLB/public_outputs/todays_picks.json > /dev/null
          python -m json.tool MLB/public_outputs/todays_games.json > /dev/null
          python -m json.tool MLB/public_outputs/site_status.json > /dev/null

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main

          git add MLB/public_outputs/

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update MLB public outputs"

          git pull --rebase origin main
          git push origin main
