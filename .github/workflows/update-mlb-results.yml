name: Update MLB Results

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"

permissions:
  contents: write

jobs:
  update-mlb-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show MLB files
        run: |
          echo "Current directory:"
          pwd
          echo "MLB files found:"
          find mlb -maxdepth 6 -type f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update MLB results
        run: |
          python mlb/scripts/update_results.py

      - name: Validate generated JSON files
        run: |
          python -m json.tool mlb/data/public/pick_history.json > /dev/null
          python -m json.tool mlb/data/public/results_summary.json > /dev/null

      - name: Commit updated results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mlb/data/public/pick_history.json
          git add mlb/data/public/results_summary.json
          git commit -m "Update MLB results" || echo "No changes to commit"
          git push
